workflows:
  android-workflow:
    name: KL CNC Controller - Android Build
    max_build_duration: 30
    environment:
      flutter: 3.19.0
      java: 17

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build APK Debug
        script: flutter build apk --debug

      - name: Build APK Release
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your@email.com   # ← GANTI dengan email kamu
        notify:
          success: true
          failure: true
